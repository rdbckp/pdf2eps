name: PDF to EPS Pro (CloudConvert Style)

on:
  workflow_dispatch: # Klik manual dari tab Actions

jobs:
  convert-process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Pro Tools (Poppler & Ghostscript)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils ghostscript

      - name: Konversi PDF ke EPS (High Fidelity)
        run: |
          # Buat folder output
          mkdir -p output
          
          # Proses semua PDF di folder input
          for file in input/*.pdf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .pdf)
              echo "Sedang memproses: $file"
              
              # Gunakan pdftops dengan mode EPS biar layout presisi 1:1
              # Ini jauh lebih stabil dibanding ImageMagick/Ghostscript biasa
              pdftops -eps "$file" "output/${filename}.eps"
              
              echo "Sukses: output/${filename}.eps"
            fi
          done

      - name: Upload Hasil Konversi
        uses: actions/upload-artifact@v4
        with:
          name: file-eps-rapih
          path: output/
          retention-days: 7
