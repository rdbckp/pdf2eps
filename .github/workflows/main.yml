name: Download Inkscape Portable

on:
  workflow_dispatch: # Loe jalanin ini sekali aja pas mau setup tools

jobs:
  download-inkscape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create tools folder and download
        run: |
          mkdir -p tools
          echo "Lagi nyedot Inkscape AppImage, tungguin bro..."
          
          # Download Inkscape AppImage versi stabil (64-bit)
          # Link ini bakal narik versi 1.3.2 (atau yang terbaru di link stable)
          curl -L -o tools/inkscape.AppImage https://inkscape.org/gallery/item/44426/Inkscape-091e20e-x86_64.AppImage
          
          # Kasih izin eksekusi
          chmod +x tools/inkscape.AppImage
          echo "Download kelar!"

      - name: Commit and Push to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/inkscape.AppImage
          git commit -m "Add portable Inkscape to tools [skip ci]"
          git push
