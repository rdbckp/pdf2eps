name: PDF to EPS Ultimate (Inkscape Method)

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Inkscape
        run: |
          sudo add-apt-repository ppa:inkscape.dev/stable -y
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: Konversi PDF ke EPS (Text to Path)
        run: |
          mkdir -p output
          
          for file in input/*.pdf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .pdf)
              echo "Lagi diproses pake Inkscape: $file"
              
              # Trik maut: --export-type=eps --export-text-to-path
              # Ini bakal maksa semua teks jadi garis/objek vector murni
              inkscape "$file" \
                --export-type=eps \
                --export-text-to-path \
                --export-filename="output/${filename}.eps"
                
              echo "Selesai: output/${filename}.eps"
            fi
          done

      - name: Upload Hasil Anti Ngaco
        uses: actions/upload-artifact@v4
        with:
          name: eps-inkscape-result
          path: output/
