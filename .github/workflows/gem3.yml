name: PDF to EPS (Anti Tsunami Version)

on:
  workflow_dispatch:

jobs:
  convert-to-curves:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Cairo & Poppler
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Konversi PDF ke EPS (Perfect Layout & Curves)
        run: |
          mkdir -p output
          
          for file in input/*.pdf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .pdf)
              echo "Lagi proses giles: $file"
              
              # Trik Rahasia: pdftocairo
              # -eps: output formatnya EPS
              # -level3: biar support vector modern
              # Engine ini bakal otomatis ngerender font ke path kalau dia kaga nemu font-nya
              pdftocairo -eps -level3 "$file" "output/${filename}.eps"
              
              echo "Berhasil: output/${filename}.eps"
            fi
          done

      - name: Upload Hasil Jadi
        uses: actions/upload-artifact@v4
        with:
          name: file-eps-anti-tsunami
          path: output/
          retention-days: 3
