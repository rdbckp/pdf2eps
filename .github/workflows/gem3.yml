name: PDF to EPS

on:
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Inkscape
        run: |
          sudo add-apt-repository ppa:inkscape.dev/stable -y
          sudo apt-get update
          sudo apt-get install -y inkscape

      - name: PDF ke EPS
        run: |
          mkdir -p output
          
          for file in input/*.pdf; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" .pdf)
              inkscape "$file" \
                --export-type=eps \
                --export-text-to-path \
                --export-filename="output/${filename}.eps"
            fi
          done

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: eps-inkscape-result
          path: output/
